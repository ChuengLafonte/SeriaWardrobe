# SeriaWardrobe Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# How many armor sets the wardrobe can hold globally (max 9 for current GUI layout).
# If you want more than 9, pagination will be needed in future updates.
max-sets: 9

# Rank-based slot limits.
# Format: 'permission.node': number_of_slots
# Players will get the HIGHEST number from all permissions they possess.
# Default (no permission) is 2 slots.
slot-limits:
  'seriawardrobe.slots.default': 2
  # Free Ranks (Grinding)
  'seriawardrobe.slots.free1': 3
  'seriawardrobe.slots.free2': 4
  'seriawardrobe.slots.free3': 5
  'seriawardrobe.slots.free4': 6
  'seriawardrobe.slots.free5': 7
  'seriawardrobe.slots.free6': 8
  'seriawardrobe.slots.free7': 9
  # Premium Ranks
  'seriawardrobe.slots.vip': 4
  'seriawardrobe.slots.mvp': 6
  'seriawardrobe.slots.mvpplus': 9

# GUI title shown to the player (supports color codes with §).
gui-title: "§8⚔ §bWardrobe §8⚔"

# The title shown on each armor-set page (use {page} as placeholder).
page-title: "§8⚔ §bWardrobe §7» §fSet {page}"

# Messages (supports §-color-codes)
messages:
  no-permission: "§cYou don't have permission to use the wardrobe."
  set-equipped: "§aArmor set §e{page} §aequipped!"
  set-stored: "§7Armor set §e{page} §7stored back into wardrobe."
  set-empty: "§cThat armor set is empty!"
  invalid-slot: "§cYou can only place armor in its correct slot."
  wardrobe-opened: "§7Opening your wardrobe…"
